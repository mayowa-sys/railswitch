app = 'railswitch-engine'
primary_region = 'lhr'

[build]

[experimental]
  auto_rollback = true

[[services]]
  internal_port = 3001
  protocol = 'tcp'
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 3001
    handlers = []

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
