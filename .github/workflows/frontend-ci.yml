name: Frontend CI

on:
  push:
    paths:
      - 'apps/**'
  pull_request:
    paths:
      - 'apps/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
