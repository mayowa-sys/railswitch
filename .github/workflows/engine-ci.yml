name: Engine CI

on:
  push:
    paths:
      - 'services/engine/**'
  pull_request:
    paths:
      - 'services/engine/**'

defaults:
  run:
    working-directory: services/engine

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: services/engine/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build --if-present
      - run: npm test